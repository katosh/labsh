name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Run tests
        run: make check
        env:
          VERBOSE: "1"

  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Lint shell scripts
        run: |
          sudo apt-get -qq install shellcheck
          shellcheck bin/labsh test-labsh.sh
